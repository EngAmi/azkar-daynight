      <h1>أذكار الصباح والمساء — الذاكرين</h1>
      <p>تطبيق الذاكرين لأذكار الصباح والمساء الصحيحة من القرآن والسنة النبوية، مع عدّاد التسبيح والاستماع بصوت القارئ. يتطلب التطبيق تفعيل JavaScript للتجربة التفاعلية الكاملة.</p>
      <section><h2>أذكار الصباح</h2><article><p lang="ar" dir="rtl">الْحَمْدُ لِلَّهِ وَحْدَهُ، وَالصَّلاَةُ وَالسَّلاَمُ عَلَى مَنْ لاَ نَبِيَّ بَعْدَهُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> استحباب ابتداء الدعاء بالحمد لله والثناء، ثم الصلاة على رسول الله ﷺ</p><p><small>المصدر: أبو داود، برقم 3667</small></p></article><article><p lang="ar" dir="rtl">أَعُوذُ بِاللَّهِ مِنَ الشَّيطَانِ الرَّجِيمِ ﴿اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَوَاتِ وَالْأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ﴾</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> من قالها حين يصبح أُجير من الجن حتى يمسي، ومن قالها حين يمسي أُجير منهم حتى يصبح</p><p><small>المصدر: الحاكم، 1/562</small></p></article><article><p lang="ar" dir="rtl">قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">أَصْبَحْنَا وَأَصْبَحَ الْملْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْملْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: مسلم، برقم 2723</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: الترمذي، برقم 3391</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنوبَ إِلاَّ أَنْتَ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> مَنْ قَالَهَا مِنَ النَّهَارِ مُوقِنًا بِهَا، فَمَاتَ مِنْ يَوْمِهِ قَبْلَ أَنْ يُمْسِيَ، فَهُوَ مِنْ أَهْلِ الْجَنَّةِ</p><p><small>المصدر: البخاري، برقم 6306</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلاَئِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ، وَأَنَّ مُحَمَّداً عَبْدُكَ وَرَسُولُكَ</p><p><strong>التكرار:</strong> أَرْبَعُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها أربع مرات أعتقه اللَّه من النار</p><p><small>المصدر: أبو داود، برقم 5069</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لاَ شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> من قالها حين يصبح فقد أدَّى شكر يومه</p><p><small>المصدر: أبو داود، برقم 5073</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ، وَالفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ القَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، برقم 5090</small></p></article><article><p lang="ar" dir="rtl">حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ عَلَيهِ تَوَكَّلتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ</p><p><strong>التكرار:</strong> سَبْعُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها سبع مرات كفاه اللَّه ما أهمّه من أمر الدنيا والآخرة</p><p><small>المصدر: ابن السني، برقم 71</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَينِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أبو داود، برقم 5074</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ عَالِمَ الغَيْبِ وَالشَّهَادَةِ فَاطِرَ السَّمَوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لاَ إِلَهَ إِلاَّ أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطانِ وَشَرَكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءاً، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: الترمذي، برقم 3392</small></p></article><article><p lang="ar" dir="rtl">بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلاَ فِي السّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاثًا إذا أصبح وثلاثًا إذا أمسى لم يضره شيء</p><p><small>المصدر: أبو داود 5088، الترمذي 3388</small></p></article><article><p lang="ar" dir="rtl">رَضِيتُ بِاللَّهِ رَبَّاً، وَبِالْإِسْلاَمِ دِيناً، وَبِمُحَمَّدٍ ﷺ نَبِيًّا</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاثًا حين يصبح وثلاثًا حين يمسي كان حقًا على اللَّه أن يرضيه يوم القيامة</p><p><small>المصدر: أحمد، برقم 18967</small></p></article><article><p lang="ar" dir="rtl">يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغيثُ أَصْلِحْ لِي شَأْنِيَ كُلَّهُ وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: الحاكم وصححه، 1/545</small></p></article><article><p lang="ar" dir="rtl">أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذَا الْيَوْمِ: فَتْحَهُ، وَنَصْرَهُ، وَنورَهُ، وَبَرَكَتَهُ، وَهُدَاهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهِ وَشَرِّ مَا بَعْدَهُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أبو داود، برقم 5084</small></p></article><article><p lang="ar" dir="rtl">أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلاَمِ، وَعَلَى كَلِمَةِ الْإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ الْمُشرِكِينَ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أحمد، برقم 15360</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْماً نَافِعاً، وَرِزْقاً طَيِّباً، وَعَمَلاً مُتَقَبَّلاً</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: ابن ماجه، برقم 925</small></p></article><article><p lang="ar" dir="rtl">لاَ إِلَهَ إِلاَّ اللَّهُ، وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ</p><p><strong>التكرار:</strong> عَشْرُ مَرَّاتٍ</p><p><strong>الفضل:</strong> كان كمن أعتق أربعة أنفس من ولد إسماعيل</p><p><small>المصدر: البخاري 6404، مسلم 2693</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبَيِّنَا مُحَمَّدٍ</p><p><strong>التكرار:</strong> عَشْرُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من صلّى عليَّ حين يصبح عشرًا وحين يمسي عشرًا أدركته شفاعتي يوم القيامة</p><p><small>المصدر: الطبراني</small></p></article><article><p lang="ar" dir="rtl">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: مسلم، برقم 2726</small></p></article><article><p lang="ar" dir="rtl">لاَ إِلَهَ إِلاَّ اللَّهُ، وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ</p><p><strong>التكرار:</strong> مِائَةُ مَرَّةٍ</p><p><strong>الفضل:</strong> كانت له عدل عشر رقاب، وكُتب له مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حرزًا من الشيطان</p><p><small>المصدر: البخاري 3293، مسلم 2691</small></p></article><article><p lang="ar" dir="rtl">أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ</p><p><strong>التكرار:</strong> مِائَةُ مَرَّةٍ فِي اليَومِ</p><p><small>المصدر: البخاري 6307، مسلم 2702</small></p></article><article><p lang="ar" dir="rtl">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ</p><p><strong>التكرار:</strong> مِائَةُ مَرَّةٍ</p><p><strong>الفضل:</strong> لم يأتِ أحد يوم القيامة بأفضل مما جاء به إلا أحد قال مثل ما قال أو زاد عليه</p><p><small>المصدر: مسلم، برقم 2692</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنَّا نَعُوذُ بِكَ مِنْ أَنْ نُشْرِكَ بِكَ شَيْئًا نَعْلَمُهُ، وَنَسْتَغْفِرُكَ لِمَا لَا نَعْلَمُهُ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أحمد، برقم 19606</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنَ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ وَقَهْرِ الرِّجَالِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، برقم 1555</small></p></article><article><p lang="ar" dir="rtl">أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لاَ إِلَهَ إِلاَّ هُوَ، الْحَيُّ الْقَيُّومُ، وَأَتُوبُ إِلَيْهِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، الترمذي</small></p></article><article><p lang="ar" dir="rtl">يَا رَبِّ، لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ، وَلِعَظِيمِ سُلْطَانِكَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: ابن ماجه، برقم 3801</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، عَلَيْكَ تَوَكَّلْتُ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ، مَا شَاءَ اللَّهُ كَانَ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ، أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: ابن السني</small></p></article></section><section><h2>أذكار المساء</h2><article><p lang="ar" dir="rtl">الْحَمْدُ لِلَّهِ وَحْدَهُ، وَالصَّلاَةُ وَالسَّلاَمُ عَلَى مَنْ لاَ نَبِيَّ بَعْدَهُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> استحباب ابتداء الدعاء بالحمد لله والثناء، ثم الصلاة على رسول الله ﷺ</p><p><small>المصدر: أبو داود، برقم 3667</small></p></article><article><p lang="ar" dir="rtl">أَعُوذُ بِاللَّهِ مِنَ الشَّيطَانِ الرَّجِيمِ ﴿اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَوَاتِ وَالْأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ﴾</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> من قالها حين يصبح أُجير من الجن حتى يمسي، ومن قالها حين يمسي أُجير منهم حتى يصبح</p><p><small>المصدر: الحاكم، 1/562</small></p></article><article><p lang="ar" dir="rtl">أَعُوذُ بِاللَّهِ مِنَ الشَّيطَانِ الرَّجِيمِ ﴿آمَنَ الرَّسُولُ بِمَا أُنزِلَ إِلَيْهِ مِن رَّبِّهِ وَالْمُؤْمِنُونَ كُلٌّ آمَنَ بِاللَّهِ وَمَلآئِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لاَ نُفَرِّقُ بَيْنَ أَحَدٍ مِّن رُّسُلِهِ وَقَالُواْ سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ۝ لاَ يُكَلِّفُ اللَّهُ نَفْساً إِلاَّ وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ رَبَّنَا لاَ تُؤَاخِذْنَا إِن نَّسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلاَ تَحْمِلْ عَلَيْنَا إِصْراً كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِن قَبْلِنَا رَبَّنَا وَلاَ تُحَمِّلْنَا مَا لاَ طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَآ أَنتَ مَوْلاَنَا فَانصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ﴾</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> من قرأ آيتين من آخر سورة البقرة في ليلة كفتاه</p><p><small>المصدر: البخاري (4008)، ومسلم (807)</small></p></article><article><p lang="ar" dir="rtl">قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء</p><p><small>المصدر: أبو داود 5082، الترمذي 3575</small></p></article><article><p lang="ar" dir="rtl">أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذِهِ اللَّيْلَةِ وَخَيرَ مَا بَعْدَهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذِهِ اللَّيْلَةِ وَشَرِّ مَا بَعْدَهَا، رَبِّ أَعُوذُ بِكَ مِنَ الْكَسَلِ وَسُوءِ الْكِبَرِ، رَبِّ أَعُوذُ بِكَ مِنْ عَذَابٍ فِي النَّارِ وَعَذَابٍ فِي الْقَبْرِ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: مسلم، برقم 2723</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: الترمذي، برقم 3391</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لاَ يَغْفِرُ الذُّنوبَ إِلاَّ أَنْتَ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> مَنْ قَالَهَا مِنَ النَّهَارِ مُوقِنًا بِهَا، فَمَاتَ مِنْ يَوْمِهِ قَبْلَ أَنْ يُمْسِيَ، فَهُوَ مِنْ أَهْلِ الْجَنَّةِ</p><p><small>المصدر: البخاري، برقم 6306</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَمْسَيْتُ أُشْهِدُكَ، وَأُشْهِدُ حَمَلَةَ عَرْشِكَ، وَمَلاَئِكَتَكَ، وَجَمِيعَ خَلْقِكَ، أَنَّكَ أَنْتَ اللَّهُ لَا إِلَهَ إِلاَّ أَنْتَ وَحْدَكَ لاَ شَرِيكَ لَكَ، وَأَنَّ مُحَمَّداً عَبْدُكَ وَرَسُولُكَ</p><p><strong>التكرار:</strong> أَرْبَعُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها أربع مرات أعتقه اللَّه من النار</p><p><small>المصدر: أبو داود، برقم 5069</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ مَا أَمْسَى بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لاَ شَرِيكَ لَكَ، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْرُ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><strong>الفضل:</strong> من قالها حين يمسي فقد أدَّى شكر ليلته</p><p><small>المصدر: أبو داود، برقم 5073</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لاَ إِلَهَ إِلاَّ أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ، وَالفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ القَبْرِ، لاَ إِلَهَ إِلاَّ أَنْتَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، برقم 5090</small></p></article><article><p lang="ar" dir="rtl">حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ عَلَيهِ تَوَكَّلتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ</p><p><strong>التكرار:</strong> سَبْعُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها سبع مرات كفاه اللَّه ما أهمّه من أمر الدنيا والآخرة</p><p><small>المصدر: ابن السني، برقم 71</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي، اللَّهُمَّ اسْتُرْ عَوْرَاتِي، وَآمِنْ رَوْعَاتِي، اللَّهُمَّ احْفَظْنِي مِنْ بَينِ يَدَيَّ، وَمِنْ خَلْفِي، وَعَنْ يَمِينِي، وَعَنْ شِمَالِي، وَمِنْ فَوْقِي، وَأَعُوذُ بِعَظَمَتِكَ أَنْ أُغْتَالَ مِنْ تَحْتِي</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أبو داود، برقم 5074</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ عَالِمَ الغَيْبِ وَالشَّهَادَةِ فَاطِرَ السَّمَوَاتِ وَالْأَرْضِ، رَبَّ كُلِّ شَيْءٍ وَمَلِيكَهُ، أَشْهَدُ أَنْ لاَ إِلَهَ إِلاَّ أَنْتَ، أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ الشَّيْطانِ وَشَرَكِهِ، وَأَنْ أَقْتَرِفَ عَلَى نَفْسِي سُوءاً، أَوْ أَجُرَّهُ إِلَى مُسْلِمٍ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: الترمذي، برقم 3392</small></p></article><article><p lang="ar" dir="rtl">بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلاَ فِي السّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاثًا إذا أصبح وثلاثًا إذا أمسى لم يضره شيء</p><p><small>المصدر: أبو داود 5088، الترمذي 3388</small></p></article><article><p lang="ar" dir="rtl">رَضِيتُ بِاللَّهِ رَبَّاً، وَبِالْإِسْلاَمِ دِيناً، وَبِمُحَمَّدٍ ﷺ نَبِيًّا</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها ثلاثًا حين يصبح وثلاثًا حين يمسي كان حقًا على اللَّه أن يرضيه يوم القيامة</p><p><small>المصدر: أحمد، برقم 18967</small></p></article><article><p lang="ar" dir="rtl">يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغيثُ أَصْلِحْ لِي شَأْنِيَ كُلَّهُ وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: الحاكم وصححه، 1/545</small></p></article><article><p lang="ar" dir="rtl">أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ رَبِّ الْعَالَمِينَ، اللَّهُمَّ إِنِّي أَسْأَلُكَ خَيْرَ هَذِهِ اللَّيْلَةِ: فَتْحَهَا وَنَصْرَهَا، وَنُورَهَا وَبَرَكَتَهَا، وَهُدَاهَا، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِيهَا وَشَرِّ مَا بَعْدَهَا</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أبو داود، برقم 5084</small></p></article><article><p lang="ar" dir="rtl">أَمْسَيْنَا عَلَى فِطْرَةِ الْإِسْلاَمِ، وَعَلَى كَلِمَةِ الْإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ ﷺ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ الْمُشرِكِينَ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: أحمد، برقم 15360</small></p></article><article><p lang="ar" dir="rtl">لاَ إِلَهَ إِلاَّ اللَّهُ، وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ</p><p><strong>التكرار:</strong> عَشْرُ مَرَّاتٍ</p><p><strong>الفضل:</strong> كان كمن أعتق أربعة أنفس من ولد إسماعيل</p><p><small>المصدر: البخاري 6404، مسلم 2693</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبَيِّنَا مُحَمَّدٍ</p><p><strong>التكرار:</strong> عَشْرُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من صلّى عليَّ حين يصبح عشرًا وحين يمسي عشرًا أدركته شفاعتي يوم القيامة</p><p><small>المصدر: الطبراني</small></p></article><article><p lang="ar" dir="rtl">أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><strong>الفضل:</strong> من قالها حين يمسي ثلاث مرات لم تضرّه حُمَة تلك الليلة</p><p><small>المصدر: أحمد، برقم 7898</small></p></article><article><p lang="ar" dir="rtl">سُبْحَانَ اللَّهِ وَبِحَمْدِهِ</p><p><strong>التكرار:</strong> مِائَةُ مَرَّةٍ</p><p><strong>الفضل:</strong> لم يأتِ أحد يوم القيامة بأفضل مما جاء به إلا أحد قال مثل ما قال أو زاد عليه</p><p><small>المصدر: مسلم، برقم 2692</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنَّا نَعُوذُ بِكَ مِنْ أَنْ نُشْرِكَ بِكَ شَيْئًا نَعْلَمُهُ، وَنَسْتَغْفِرُكَ لِمَا لَا نَعْلَمُهُ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أحمد، برقم 19606</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنَ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ وَقَهْرِ الرِّجَالِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، برقم 1555</small></p></article><article><p lang="ar" dir="rtl">أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لاَ إِلَهَ إِلاَّ هُوَ، الْحَيُّ الْقَيُّومُ، وَأَتُوبُ إِلَيْهِ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: أبو داود، الترمذي</small></p></article><article><p lang="ar" dir="rtl">يَا رَبِّ، لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ، وَلِعَظِيمِ سُلْطَانِكَ</p><p><strong>التكرار:</strong> ثَلَاثُ مَرَّاتٍ</p><p><small>المصدر: ابن ماجه، برقم 3801</small></p></article><article><p lang="ar" dir="rtl">اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، عَلَيْكَ تَوَكَّلْتُ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ، مَا شَاءَ اللَّهُ كَانَ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ، وَلَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ، أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا، اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ</p><p><strong>التكرار:</strong> مَرَّةٌ وَاحِدَةٌ</p><p><small>المصدر: ابن السني</small></p></article></section>
